<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Learn languages with quick, focused grammar and vocabulary quizzes.">
  <meta name="theme-color" content="#1F3A5F">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quiz · Learn Languages">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <!-- Open Graph / social link previews (WhatsApp, iMessage, Slack, Facebook, LinkedIn).
       og:url and og:image use absolute URLs, as most crawlers require. -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.languagequiz.org/">
  <meta property="og:site_name" content="Quiz · Learn Languages">
  <meta property="og:title" content="Quiz · Learn Languages">
  <meta property="og:description" content="Learn languages with quick, focused grammar and vocabulary quizzes.">
  <meta property="og:image" content="https://www.languagequiz.org/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Quiz · Learn Languages">

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Quiz · Learn Languages">
  <meta name="twitter:description" content="Learn languages with quick, focused grammar and vocabulary quizzes.">
  <meta name="twitter:image" content="https://www.languagequiz.org/og-image.png">

  <title>Quiz · Learn Languages</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
