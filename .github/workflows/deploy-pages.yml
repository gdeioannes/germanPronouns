name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: ["main", "Main"]
  pull_request:
    branches: ["main", "Main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        # TTS_PROXY_URL points the web app at the Cloudflare Worker that holds
        # the cloud TTS keys (it's a URL, not a secret, so it's fine inline).
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define=TTS_PROXY_URL=https://german-tts-proxy.gdeioannes.workers.dev

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
